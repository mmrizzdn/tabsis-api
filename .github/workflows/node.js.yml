# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  deploy:
    environment: development-server
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
              set -e
              
              NGROK_TOKEN="${{ secrets.NGROK_AUTH_TOKEN }}"

              if [ ! -d ${{ secrets.APP_DIR }} ]; then
                  echo "App direuctory does not exist. Cloning repository..."
                  git clone ${{ secrets.REPO_URL }} ${{ secrets.APP_DIR }}
              fi

              cd ${{ secrets.APP_DIR }}

              git fetch --all
              git reset --hard origin/main || git reset --hard origin/master

              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              
              echo "Node.js version: $(node --version)"
              echo "npm version: $(npm --version)"

              npm install

              echo "Running Prisma migrations..."
              npx prisma migrate deploy

              pm2 reload all --update-env || pm2 start ecosystem.config.cjs

              if [ -n "$NGROK_TOKEN" ]; then
                  echo "Starting ngrok tunnel..."
                  pkill ngrok || true

                  # Get port from secrets or default to 3000
                  APP_PORT="${{ secrets.APP_PORT }}"
                  if [ -z "$APP_PORT" ]; then
                      APP_PORT="3000"
                  fi

                  # Use explicit host-header to fix "malformed Host header" errors
                  # This ensures ngrok rewrites Host header to localhost:PORT for all requests
                  nohup ngrok http "$APP_PORT" --authtoken "$NGROK_TOKEN" --host-header="localhost:$APP_PORT" --log=stdout > /tmp/ngrok.log 2>&1 &
                  sleep 3
                  
                  NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | grep -o 'https://[^"]*\.ngrok[^"]*' | head -1 || echo "")
                  if [ -n "$NGROK_URL" ]; then
                      echo "Ngrok tunnel started: $NGROK_URL"
                  else
                      echo "Ngrok started but URL not available yet. Check logs: /tmp/ngrok.log"
                  fi
              fi
          EOF
