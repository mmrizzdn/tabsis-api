name: Node.js CI

on:
  push:
    branches:
      - 'develop'
      # - 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'tabsis-api / production' || 'tabsis-api / development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NodeJS 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Packages
        run: npm install

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Run Migration
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Seeder
        run: npx prisma db seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPERADMIN_USERNAME: ${{ secrets.SUPERADMIN_USERNAME }}
          SUPERADMIN_EMAIL: ${{ secrets.SUPERADMIN_EMAIL }}
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
